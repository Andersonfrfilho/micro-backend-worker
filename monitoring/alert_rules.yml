groups:
  - name: backend-worker-alerts
    rules:
      # High Error Rate Alert
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / rate(http_requests_total[5m]) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High error rate detected'
          description: 'Error rate is {{ $value }}% (threshold: 5%)'

      # High Latency Alert
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[10m])) > 0.5
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: 'High latency detected'
          description: '95th percentile latency is {{ $value }}s (threshold: 0.5s)'

      # Queue Consumer Down Alert
      - alert: QueueConsumerDown
        expr: up{job="backend-worker"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: 'Queue consumer is down'
          description: 'Backend worker has been down for more than 2 minutes'

      # RabbitMQ Connection Lost Alert
      - alert: RabbitMQConnectionLost
        expr: up{job="rabbitmq"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'RabbitMQ connection lost'
          description: 'RabbitMQ service is unreachable'

      # High CPU Usage Alert
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High CPU usage detected'
          description: 'CPU usage is {{ $value }}% (threshold: 80%)'

      # High Memory Usage Alert
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: 'High memory usage detected'
          description: 'Memory usage is {{ $value }}% (threshold: 80%)'

      # Database Connection Issues
      - alert: DatabaseConnectionIssues
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: 'Database connection lost'
          description: 'PostgreSQL database is unreachable'
